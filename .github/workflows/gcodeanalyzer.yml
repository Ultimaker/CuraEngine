name: GcodeAnalyzer
on:
  push:
    paths:
      - 'include/**'
      - 'src/**'
      - '.github/workflows/gcodeanalyzer.yml'
    branches:
      - main
  pull_request:
    types: [ opened, reopened, synchronize ]
    paths:
      - 'include/**'
      - 'src/**'
      - '.github/workflows/gcodeanalyzer.yml'
      - 'conandata.yml'
    branches:
      - main
      - 'CURA-*'
      - 'PP-*'
      - 'NP-*'
      - '[0-9]+.[0-9]+'

permissions:
  contents: write
  deployments: write


jobs:
  check_actor:
    uses: ultimaker/cura-workflows/.github/workflows/check-actor.yml@main
    secrets: inherit

  extract-ticket:
    name: Extract Jira ticket from branch
    runs-on: ubuntu-latest
    if: github.ref_name != 'main'
    outputs:
      ticket: ${{ steps.extract.outputs.ticket }}
    steps:
      - name: Extract ticket number
        id: extract
        run: |
          branch="${{ github.head_ref || github.ref_name }}"
          ticket=$(echo "$branch" | grep -oP '^(CURA|PP|NP)-\d+' || echo "")
          echo "ticket=$ticket" >> $GITHUB_OUTPUT

  find-packages:
    name: Find ticket-specific packages
    needs: [extract-ticket]
    if: always() && needs.extract-ticket.outputs.ticket != ''
    uses: ultimaker/cura-workflows/.github/workflows/find-package-by-ticket.yml@main
    with:
      jira_ticket_number: ${{ needs.extract-ticket.outputs.ticket }}
    secrets: inherit

  gcodeanalyzer:
    name: Run GCodeAnalyzer on the engine
    needs: [check_actor, find-packages]
    if: >-
      always() &&
      needs.check_actor.outputs.proceed == 'true' &&
      (needs.find-packages.result == 'success' || needs.find-packages.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Setup the build environment
        uses: ultimaker/cura-workflows/.github/actions/setup-build-environment@main
        with:
          install_system_dependencies: true

      - name: Resolve GCodeAnalyzer branch
        id: resolve_gca_branch
        run: |
          branch="${{ github.head_ref || github.ref_name }}"
          if git ls-remote --heads --exit-code \
              "https://x-access-token:${{ secrets.CURA_BENCHMARK_PAT }}@github.com/Ultimaker/GCodeAnalyzer.git" \
              "$branch" > /dev/null 2>&1; then
            echo "ref=$branch" >> $GITHUB_OUTPUT
          else
            echo "ref=main" >> $GITHUB_OUTPUT
          fi

      - name: Checkout GCodeAnalyzer
        uses: actions/checkout@v4
        with:
          repository: 'Ultimaker/GCodeAnalyzer'
          ref: ${{ steps.resolve_gca_branch.outputs.ref }}
          path: 'GCodeAnalyzer'
          fetch-depth: 1
          token: ${{ secrets.CURA_BENCHMARK_PAT }}

      - name: Checkout Test Models
        uses: actions/checkout@v4
        with:
          repository: 'Ultimaker/NightlyTestModels'
          ref: 'main'
          path: 'NightlyTestModels'
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python requirements
        run: |
          pip install pandas
          pip install git+https://github.com/ultimaker/libcharon@CURA-9495_analyzer_requisites#egg=charon

      - name: Resolve package overrides
        id: resolve_overrides
        run: |
          overrides="${{ needs.find-packages.outputs.package_overrides }}"

          for pkg in cura_resources cura-formulae-engine; do
            # Skip if this package is already covered by a ticket-specific override
            if echo " $overrides " | grep -q " ${pkg}/"; then
              continue
            fi

            # Read the required version from conandata.yml
            version=$(python3 -c "
import yaml
d = yaml.safe_load(open('conandata.yml'))
all_reqs = d.get('requirements', []) + d.get('requirements_cura_resources', [])
match = next((r for r in all_reqs if r.startswith('${pkg}/')), None)
print(match.split('/')[1].split('@')[0] if match else '')
")

            if [[ -z "$version" ]]; then
              continue
            fi

            # Fallback: find the latest published package for this version across all channels.
            # No @user/channel filter so release packages (e.g. pkg/5.13.0 with no channel)
            # are candidates alongside dev packages (@ultimaker/testing).
            fallback=$(python3 Cura-workflows/runner_scripts/conan_package_finder.py \
              --search-pattern "${pkg}/${version}*" \
              --output-format github-actions 2>/dev/null \
              | grep '^package_overrides=' | cut -d'=' -f2- || true)

            if [[ -n "$fallback" ]]; then
              overrides="${overrides:+$overrides }$fallback"
            fi
          done

          echo "package_overrides=$overrides" >> $GITHUB_OUTPUT

      - name: Set package overrides
        id: set_overrides
        if: steps.resolve_overrides.outputs.package_overrides != ''
        uses: ultimaker/cura-workflows/.github/actions/set-package-overrides@main
        with:
          package_overrides: ${{ steps.resolve_overrides.outputs.package_overrides }}

      - name: Install dependencies and build CuraEngine
        run: conan build . -pr "${{ steps.set_overrides.outputs.profile || 'default' }}" -s build_type=Release --build=missing --update -g VirtualRunEnv -o "curaengine/*:with_cura_resources=True"

      - name: Collect STL-files, run CuraEngine, output GCode-files
        run: |
          source build/Release/generators/conanrun.sh
          echo $CURA_RESOURCES
          ls $CURA_RESOURCES
          for file in `ls NightlyTestModels/*.stl`;
          do
              ( time ./build/Release/CuraEngine slice --force-read-parent --force-read-nondefault -v -p -j $CURA_RESOURCES/definitions/ultimaker_s3.def.json -l $file -o `basename $file .stl`.gcode ) 2> `basename $file .stl`.time
          done

      - name: Run GCodeAnalyzer on generated GCode files
        id: gcode_out
        run: python3 GCodeAnalyzer/scripts/analyze_gcode.py --input-dir . --output-file output.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: CGcodeAnalyzer
          output-file-path: output.json
          gh-repository: github.com/Ultimaker/CuraEngineBenchmarks
          gh-pages-branch: main
          benchmark-data-dir-path: dev/gcodeanalyzer
          tool: customBiggerIsBetter
          github-token: ${{ secrets.CURA_BENCHMARK_PAT }}
          auto-push: true
          max-items-in-chart: 250
